<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Heval</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@pyscript/core@0.7.19/dist/core.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@pyscript/core@0.7.19/dist/core.js"></script>
    <style>
      pre { white-space: pre-wrap; }
      #human_model_form {
        display: grid;
        grid-template-columns: max-content auto;
        column-gap: 5px;
      }
      @media (hover: none) {
        abbr[title]:focus::after {
          content: " (" attr(title) ")";
          font-size: 0.9em;
          color: #555;
        }
      }
    </style>
  </head>
  <body>
    <h3>Heval: the human evaluator</h3>
    <p><small>Calculate what your human crave!</small></p>
    <fieldset id="human_model_form"><legend>Model properties</legend>
      <div>
        <select id="body_sex" name="body_sex">
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="child">Child</option>
        </select>
        <label for="body_sex">sex</label>
      </div>
      <div><button id="body_reset">Reset</button></div>
    </fieldset>
    <p id="output_flags"></p>
    <details open>
      <summary>Body</summary>
      <pre id="output_body">🟡 Please wait</pre>
    </details>
    <details open>
      <summary>Labs</summary>
      <pre id="output_labs">🟡 Please wait</pre>
    </details>
    <p style="text-align: right;"><a href="https://github.com/radioxoma/heval/" target="_blank">Heval on GitHub</a></p>
    <script type="py" src="./main.py" config="./pyscript.json"></script>
  </body>
</html>
